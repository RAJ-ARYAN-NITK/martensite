services:

  zookeeper:
    container_name: delivery_zookeeper
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    container_name: delivery_kafka
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Set up two listeners: one for Docker (INTERNAL) and one for your Mac (EXTERNAL)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis:
    container_name: delivery_redis
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    container_name: delivery_backend
    build: ./backend
    ports:
      - "8001:8000" # Maps Docker's internal 8000 to your Mac's 8001
    env_file:
      - .env
    environment:
      # This forces Docker to use the internal Kafka address, ignoring your Mac's .env file
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
      - redis
    volumes:
      - ./backend:/app
    # The exclude flag stops Docker from watching your Mac's venv folder and going into an infinite reload loop
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude "venv/*"